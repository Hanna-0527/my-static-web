<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Find Nomi</title>
    <style>
         
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "苹方", sans-serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .bg-map {
            width: 100%;
            height: auto;
            position: absolute;
            top: -55px;
            left: 0;
            z-index: 1;
        }
        .bg-map img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top left;
        }

        /* 左上角绿色标题 */
        .logo-box {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        .logo-box span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 210px;
            height: 102px;
            background-color: #026002;
            color: #fff;
            font-size: 37.5px;
            font-weight: bold;
            border-radius: 40px;
        }

        /* 左侧导航栏 */
        .sidebar-left {
            position: absolute;
            top: 130px;
            left: 20px;
            width: 210px;
            height: 79vh;
            background-color: #169750;
            padding: 11px 14px;
            border-radius: 40px;
            overflow: hidden;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 黄色功能按钮 */
        .btn-yellow {
            background-color: #FFF1A3;
            border-radius: 50px;
            padding: 16px 12px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .btn-yellow img {
            width: 32px;
            margin-left: 10px;
        }
        .btn-yellow p:first-child {
            font-size: 20px;
            font-weight: bold;
            color: #006800
        }
        .btn-yellow p:last-child {
            font-size: 16px;
            opacity: 0.8;
            color: #006800
        }

        /* 实时状态 */
        .status-card {
            background-color: #FFF1A3;
            border-radius: 40px;
            padding: 12px 10px;
            margin-top: 0px;
        }
        /* 图标 + 文字 */
        .status-header {
            display: flex;
            align-items: center;
            gap: 17px;
            margin-bottom: 10px;
        }
        .status-header img {
            width: 36px;
            height: 36px;
            margin-left: 10px;
        }
        .title-group p:first-child {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.2;
            color: #006800
        }
        .title-group p:last-child {
            font-size: 15px;
            line-height: 1.2;
            color: #006800
        }
        .status-info {
            font-size: 13px;
            line-height: 1.55;
            margin-left: 15px;
            margin-top: -8px;
            color: #006800
        }
        .status-info p {
            white-space: nowrap; 
        }

        .goose-mark {
            position: absolute;
            top: 42%;
            left: 48%;
            width: 55px;
            z-index: 5;
        }

        .camera-mark {
            position: absolute;
            width: 30px;
            z-index: 5;
        }
        /* 热力图 */
        .heatmap-layer {
            position: absolute;
            top: 3%;
            left: 30%;
            width: 50%;
            opacity: 0.75;
            z-index: 2;
            pointer-events: none;
        }
        .heatmap-layer img {
            width: 100%;
            height: auto;
            display: block;
        }

        .total-record-box {
            position: absolute;
            bottom: 50px;
            right: 50px;
            z-index: 10;
            background-color: #ffffff;
            border: 2px solid #4183ff;
            border-radius: 30px;
            padding: 10px 22px;
            font-size: 17px;
            color: #4183ff;
            font-weight: 500;   
        }     
    </style>
</head>
<body>
    <div class="bg-map">
        <img src="./campus.png" alt="校园底图">
    </div>

    <div class="heatmap-layer">
        <img src="images/icon_heat2.svg" alt="热力分布图">
    </div>

    <a href="index.html" class="logo-box">
        <span>Find Nomi</span>
    </a>

    <div class="sidebar-left">

        <a href="report.html" class="btn-yellow">
            <img src="images/icon_report.svg" alt="上报图标">
            <div>
                <p>上报</p>
                <p>Report</p>
            </div>
        </a>

        <div class="btn-yellow" style="background-color: #ffde5b;">
            <img src="images/icon_heat3.svg" alt="热力图图标">
            <div>
                <p style="color: #675305;">热力图</p>
                <p style="color: #675305;">Heatmap</p>
            </div>
        </div>

        <a href="trajectory.html" class="btn-yellow">
            <img src="images/icon_track.svg" alt="足迹图标">
            <div>
                <p>今日足迹</p>
                <p>Trajectory</p>
            </div>
        </a>

        <!--实时状态-->
        <div class="status-card">
            <div class="status-header">
                <img src="images/icon_live.svg" alt="状态图标">
                <div class="title-group">
                    <p>实时状态</p>
                    <p>Live Status</p>
                </div>
            </div>
            <div class="status-info">
                <p>最新位置: 图书馆前</p>
                <p>Latest Location: Library</p>

                <p>发现时间 2026-06-17</p>
                <p>Timestamp 14:30:00</p>

                <p>目击相机 Camera:</p>
                <p>CAM_Library_01</p>

                <p>当前状态: 散步</p>
                <p>Current Condition:</p>
                <p>Wandering</p>
            </div>
        </div>
    </div>

    <img class="goose-mark" src="images/goose_icon.svg" alt="大鹅">
    <img class="camera-mark" src="images/camera_marker.svg" style="top:27%;left:54%;">
    <img class="camera-mark" src="images/camera_marker.svg" style="top:36%;left:50%;">
    <img class="camera-mark" src="images/camera_marker.svg" style="top:45%;left:43%;">
    <img class="camera-mark" src="images/camera_marker.svg" style="top:51%;left:35%;">
    <img class="camera-mark" src="images/camera_marker.svg" style="top:83%;left:50%;">

    <div class="total-record-box">
        总记录坐标 Total Records: 1,402
    </div>
</body>
</html>
